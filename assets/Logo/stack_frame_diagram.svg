<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500">
  <rect width="400" height="500" fill="#0D0D0D"/>
  <text x="200" y="35" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#00FF41" text-anchor="middle">STACK FRAME LAYOUT</text>
  <!-- Stack blocks -->
  <!-- High address -->
  <rect x="80" y="60" width="240" height="45" fill="#1A1A1A" stroke="#00FF41" stroke-width="1.5"/>
  <text x="200" y="88" font-family="Courier New, monospace" font-size="13" fill="#FFA500" text-anchor="middle">caller arguments</text>
  <text x="320" y="88" font-family="Courier New, monospace" font-size="10" fill="#00FF41" opacity="0.5" text-anchor="middle">high addr</text>

  <rect x="80" y="105" width="240" height="45" fill="#1A1A1A" stroke="#00FF41" stroke-width="1.5"/>
  <text x="200" y="133" font-family="Courier New, monospace" font-size="13" fill="#00FF41" text-anchor="middle">return address</text>

  <rect x="80" y="150" width="240" height="45" fill="#1A2A1A" stroke="#00FF41" stroke-width="1.5"/>
  <text x="200" y="178" font-family="Courier New, monospace" font-size="13" fill="#00FF41" text-anchor="middle">saved RBP  ← RBP</text>

  <rect x="80" y="195" width="240" height="45" fill="#1A1A1A" stroke="#00FF41" stroke-width="1.5"/>
  <text x="200" y="223" font-family="Courier New, monospace" font-size="13" fill="#F0F0F0" text-anchor="middle">local var 1</text>

  <rect x="80" y="240" width="240" height="45" fill="#1A1A1A" stroke="#00FF41" stroke-width="1.5"/>
  <text x="200" y="268" font-family="Courier New, monospace" font-size="13" fill="#F0F0F0" text-anchor="middle">local var 2</text>

  <rect x="80" y="285" width="240" height="45" fill="#1A1A1A" stroke="#00FF41" stroke-width="1.5"/>
  <text x="200" y="313" font-family="Courier New, monospace" font-size="13" fill="#F0F0F0" text-anchor="middle">local var 3</text>

  <rect x="80" y="330" width="240" height="45" fill="#1A2A2A" stroke="#00BFFF" stroke-width="1.5"/>
  <text x="200" y="358" font-family="Courier New, monospace" font-size="13" fill="#00BFFF" text-anchor="middle">stack canary</text>

  <rect x="80" y="375" width="240" height="45" fill="#0D0D0D" stroke="#00FF41" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="200" y="403" font-family="Courier New, monospace" font-size="13" fill="#00FF41" text-anchor="middle">↑ RSP (grows down)</text>
  <text x="320" y="403" font-family="Courier New, monospace" font-size="10" fill="#00FF41" opacity="0.5" text-anchor="middle">low addr</text>

  <!-- Arrow -->
  <line x1="60" y1="150" x2="80" y2="172" stroke="#FFA500" stroke-width="2"/>
  <text x="20" y="165" font-family="Courier New, monospace" font-size="11" fill="#FFA500">RBP</text>
  <line x1="60" y1="390" x2="80" y2="390" stroke="#00FF41" stroke-width="2"/>
  <text x="20" y="394" font-family="Courier New, monospace" font-size="11" fill="#00FF41">RSP</text>

  <!-- Title footer -->
  <text x="200" y="470" font-family="Courier New, monospace" font-size="11" fill="#00FF41" text-anchor="middle" opacity="0.6">NullByte Academy — M02: Memory Layout</text>
</svg>
