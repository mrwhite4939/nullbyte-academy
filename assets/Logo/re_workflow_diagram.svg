<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <rect width="500" height="400" fill="#0D0D0D"/>
  <text x="250" y="35" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#00FF41" text-anchor="middle">REVERSE ENGINEERING WORKFLOW</text>

  <!-- Step boxes -->
  <rect x="175" y="55" width="150" height="45" fill="#1A2A1A" stroke="#00FF41" stroke-width="1.5" rx="3"/>
  <text x="250" y="83" font-family="Courier New, monospace" font-size="13" fill="#00FF41" text-anchor="middle">Binary Input</text>

  <line x1="250" y1="100" x2="250" y2="120" stroke="#00FF41" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="30" y="120" width="160" height="45" fill="#1A1A2A" stroke="#00BFFF" stroke-width="1.5" rx="3"/>
  <text x="110" y="148" font-family="Courier New, monospace" font-size="12" fill="#00BFFF" text-anchor="middle">Static Analysis</text>

  <rect x="310" y="120" width="160" height="45" fill="#2A1A1A" stroke="#FFA500" stroke-width="1.5" rx="3"/>
  <text x="390" y="148" font-family="Courier New, monospace" font-size="12" fill="#FFA500" text-anchor="middle">Dynamic Analysis</text>

  <!-- Static sub-steps -->
  <rect x="30" y="195" width="160" height="35" fill="#111" stroke="#00BFFF" stroke-width="1" rx="2"/>
  <text x="110" y="217" font-family="Courier New, monospace" font-size="11" fill="#F0F0F0" text-anchor="middle">Disassembly (Ghidra)</text>

  <rect x="30" y="238" width="160" height="35" fill="#111" stroke="#00BFFF" stroke-width="1" rx="2"/>
  <text x="110" y="260" font-family="Courier New, monospace" font-size="11" fill="#F0F0F0" text-anchor="middle">CFG Construction</text>

  <rect x="30" y="281" width="160" height="35" fill="#111" stroke="#00BFFF" stroke-width="1" rx="2"/>
  <text x="110" y="303" font-family="Courier New, monospace" font-size="11" fill="#F0F0F0" text-anchor="middle">Xref + Symbol Map</text>

  <!-- Dynamic sub-steps -->
  <rect x="310" y="195" width="160" height="35" fill="#111" stroke="#FFA500" stroke-width="1" rx="2"/>
  <text x="390" y="217" font-family="Courier New, monospace" font-size="11" fill="#F0F0F0" text-anchor="middle">GDB / Breakpoints</text>

  <rect x="310" y="238" width="160" height="35" fill="#111" stroke="#FFA500" stroke-width="1" rx="2"/>
  <text x="390" y="260" font-family="Courier New, monospace" font-size="11" fill="#F0F0F0" text-anchor="middle">Memory Inspection</text>

  <rect x="310" y="281" width="160" height="35" fill="#111" stroke="#FFA500" stroke-width="1" rx="2"/>
  <text x="390" y="303" font-family="Courier New, monospace" font-size="11" fill="#F0F0F0" text-anchor="middle">Trace + Log</text>

  <!-- Converge -->
  <line x1="110" y1="316" x2="110" y2="340" stroke="#00BFFF" stroke-width="1"/>
  <line x1="390" y1="316" x2="390" y2="340" stroke="#FFA500" stroke-width="1"/>
  <line x1="110" y1="340" x2="390" y2="340" stroke="#00FF41" stroke-width="1.5"/>
  <line x1="250" y1="340" x2="250" y2="360" stroke="#00FF41" stroke-width="1.5"/>
  <rect x="160" y="360" width="180" height="30" fill="#1A2A1A" stroke="#00FF41" stroke-width="1.5" rx="3"/>
  <text x="250" y="380" font-family="Courier New, monospace" font-size="12" fill="#00FF41" text-anchor="middle">Analysis Report</text>

  <!-- Connectors -->
  <line x1="175" y1="142" x2="190" y2="142" stroke="#00BFFF" stroke-width="1"/>
  <line x1="310" y1="142" x2="310" y2="142" stroke="#FFA500" stroke-width="1"/>

  <text x="250" y="395" font-family="Courier New, monospace" font-size="10" fill="#00FF41" text-anchor="middle" opacity="0.5">NullByte Academy — M04: Reverse Engineering</text>
</svg>
