<svg xmlns="http://www.w3.org/2000/svg" width="400" height="520" viewBox="0 0 400 520">
  <rect width="400" height="520" fill="#0D0D0D"/>
  <text x="200" y="35" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#00FF41" text-anchor="middle">VIRTUAL ADDRESS SPACE</text>

  <!-- Segments -->
  <rect x="80" y="55" width="240" height="40" fill="#1A0A0A" stroke="#FF4444" stroke-width="1.5"/>
  <text x="200" y="80" font-family="Courier New, monospace" font-size="13" fill="#FF4444" text-anchor="middle">Kernel Space</text>

  <rect x="80" y="100" width="240" height="40" fill="#1A1A2A" stroke="#00BFFF" stroke-width="1.5"/>
  <text x="200" y="125" font-family="Courier New, monospace" font-size="13" fill="#00BFFF" text-anchor="middle">Stack  (grows ↓)</text>

  <rect x="80" y="145" width="240" height="40" fill="#0D0D0D" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="200" y="170" font-family="Courier New, monospace" font-size="12" fill="#444" text-anchor="middle">[ unmapped region ]</text>

  <rect x="80" y="190" width="240" height="40" fill="#1A1A2A" stroke="#8888FF" stroke-width="1.5"/>
  <text x="200" y="215" font-family="Courier New, monospace" font-size="13" fill="#8888FF" text-anchor="middle">Heap  (grows ↑)</text>

  <rect x="80" y="235" width="240" height="40" fill="#1A2A1A" stroke="#00FF41" stroke-width="1.5"/>
  <text x="200" y="260" font-family="Courier New, monospace" font-size="13" fill="#00FF41" text-anchor="middle">BSS  (uninit. data)</text>

  <rect x="80" y="280" width="240" height="40" fill="#2A2A1A" stroke="#FFA500" stroke-width="1.5"/>
  <text x="200" y="305" font-family="Courier New, monospace" font-size="13" fill="#FFA500" text-anchor="middle">Data  (init. globals)</text>

  <rect x="80" y="325" width="240" height="40" fill="#2A1A1A" stroke="#FF6B6B" stroke-width="1.5"/>
  <text x="200" y="350" font-family="Courier New, monospace" font-size="13" fill="#FF6B6B" text-anchor="middle">Text  (code, R-X)</text>

  <!-- Address labels -->
  <text x="340" y="75" font-family="Courier New, monospace" font-size="9" fill="#666" text-anchor="start">0xFFFF...</text>
  <text x="340" y="370" font-family="Courier New, monospace" font-size="9" fill="#666" text-anchor="start">0x0000...</text>

  <!-- High/Low -->
  <text x="40" y="75" font-family="Courier New, monospace" font-size="10" fill="#666" text-anchor="middle">HIGH</text>
  <text x="40" y="365" font-family="Courier New, monospace" font-size="10" fill="#666" text-anchor="middle">LOW</text>

  <line x1="50" y1="85" x2="50" y2="360" stroke="#444" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="200" y="490" font-family="Courier New, monospace" font-size="11" fill="#00FF41" text-anchor="middle" opacity="0.6">NullByte Academy — M02: Memory Layout</text>
</svg>
